<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        label{
            color: darkblue;
            font-weight: bold;
        }

        input, select, textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .btn{
            background-color: darkblue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table, th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: darkblue;
            color: white;
        }

        td{
            color: darkblue;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form>

        <label>Full Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Password</label>
        <input type="password">

        <label>Phone Number</label>
        <input type="tel">

        <label>Date of Birth</label>
        <input type="date">

        <label>Select Course</label>
        <select>
            <option>BCA</option>
            <option>BSc</option>
            <option>BCom</option>
            <option>Engineering</option>
        </select>

        <label>Gender</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Address</label>
        <textarea rows="4"></textarea>

        <button type="submit" class="btn">Register</button>

    </form>

    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>BCA</td>
            <td>Mumbai</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>BSc</td>
            <td>Pune</td>
        </tr>

        <tr>
            <td>Aman</td>
            <td>BCom</td>
            <td>Nashik</td>
        </tr>

        <tr>
            <td>Sneha</td>
            <td>Engineering</td>
            <td>Nagpur</td>
        </tr>

    </table>

</div>

</body>
</html>
